version: "3.9"

services:
  backend:
    build:
      context: ../../Backend
      dockerfile: ../infrastructure/docker/backend.Dockerfile
    ports: ["3000:3000"]
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://vertexchain:vertexchain@postgres:5432/vertexchain
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../Backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ../../Frontend
      dockerfile: ../infrastructure/docker/frontend.Dockerfile
    ports: ["3001:80"]
    depends_on: [backend]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vertexchain
      POSTGRES_PASSWORD: vertexchain
      POSTGRES_DB: vertexchain
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vertexchain"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
